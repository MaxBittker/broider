# fly.toml app configuration file generated for broider-gallery on 2026-03-13T12:18:20-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'broider-gallery'
primary_region = 'ord'

[build]

[env]
  DB_PATH = '/data/broider.db'
  PORT = '8080'

[[mounts]]
  source = 'broider_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
